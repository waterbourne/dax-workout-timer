<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Agent Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e94560;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid rgba(233, 69, 96, 0.3);
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .last-update { color: #8892b0; font-size: 0.9rem; margin-top: 10px; }
        
        .action-section {
            background: rgba(233, 69, 96, 0.1);
            border: 2px solid #e94560;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        
        .action-section h2 {
            color: #e94560;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .action-badge {
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .action-item {
            background: rgba(255, 255, 255, 0.05);
            border-left: 4px solid #e94560;
            padding: 15px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .action-item:hover { background: rgba(233, 69, 96, 0.2); transform: translateX(5px); }
        .action-item.resolved { opacity: 0.5; border-left-color: #4ade80; }
        .action-item.high-priority { border-left-width: 6px; box-shadow: 0 0 20px rgba(233, 69, 96, 0.3); }
        
        .priority-indicator {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 10px;
        }
        .priority-high { background: #ef4444; color: white; }
        .priority-medium { background: #f59e0b; color: white; }
        .priority-low { background: #6b7280; color: white; }
        
        .action-text { flex: 1; }
        .action-agent { font-size: 0.75rem; color: #8892b0; text-transform: uppercase; letter-spacing: 1px; }
        
        .action-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .action-btn:hover { background: #ff6b6b; transform: scale(1.05); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover { transform: translateY(-5px); border-color: rgba(233, 69, 96, 0.5); }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #e94560; }
        .stat-label { color: #8892b0; font-size: 0.9rem; margin-top: 8px; }
        
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .agent-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .agent-card:hover { transform: translateY(-5px); border-color: rgba(233, 69, 96, 0.5); }
        
        .agent-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        
        .agent-card.active::before { background: linear-gradient(90deg, #4ade80, #22c55e); }
        .agent-card.warning::before { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .agent-card.error::before { background: linear-gradient(90deg, #ef4444, #dc2626); }
        .agent-card.idle::before { background: linear-gradient(90deg, #6b7280, #4b5563); }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .agent-name { font-size: 1.3rem; font-weight: 600; color: #fff; }
        .agent-role { font-size: 0.8rem; color: #8892b0; }
        
        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-active { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .status-warning { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .status-idle { background: rgba(107, 114, 128, 0.2); color: #9ca3af; }
        
        .agent-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .metric { text-align: center; }
        .metric-value { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .metric-label { font-size: 0.75rem; color: #8892b0; text-transform: uppercase; }
        
        .agent-schedule {
            font-size: 0.85rem;
            color: #8892b0;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .next-run { color: #e94560; font-weight: 600; }
        
        .workload-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }
        
        .workload-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .workload-low { background: linear-gradient(90deg, #4ade80, #22c55e); }
        .workload-medium { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
        .workload-high { background: linear-gradient(90deg, #ef4444, #dc2626); }
        
        .empty-state { text-align: center; padding: 40px; color: #8892b0; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 15px; }
        
        .refresh-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        
        .response-form {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        
        .response-form h3 {
            color: #fff;
            margin-bottom: 15px;
        }
        
        .response-input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        
        .response-input:focus {
            outline: none;
            border-color: #e94560;
        }
        
        .send-btn {
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
        }
        
        .send-btn:hover { transform: scale(1.02); }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid rgba(233, 69, 96, 0.5);
            color: #e94560;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .quick-btn:hover { background: rgba(233, 69, 96, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 OpenClaw Agent Dashboard</h1>
            <p class="last-update">
                Last updated: <span id="last-update">Loading...</span>
                <span class="refresh-indicator"></span>
            </p>
        </header>

        <!-- Action Items Section -->
        <section class="action-section">
            <h2>
                🚨 Needs Your Attention
                <span class="action-badge" id="action-count">0</span>
            </h2>
            <div id="action-items">
                <div class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <p>Loading action items...</p>
                </div>
            </div>
            
            <!-- Quick Response Section -->
            <div class="response-form">
                <h3>💬 Send Message to Agents</h3>
                <input type="text" class="response-input" id="user-message" 
                       placeholder="Type your response or question...">
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickMessage('Approved')">✓ Approved</button>
                    <button class="quick-btn" onclick="quickMessage('Need more info')">❓ Need Info</button>
                    <button class="quick-btn" onclick="quickMessage('Hold off for now')">⏸️ Hold</button>
                    <button class="quick-btn" onclick="quickMessage('Good to go')">🚀 Good to Go</button>
                </div>
            </div>
        </section>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-agents">-</div>
                <div class="stat-label">Active Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tasks-today">-</div>
                <div class="stat-label">Tasks Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="errors-today">-</div>
                <div class="stat-label">Errors Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tokens-today">-</div>
                <div class="stat-label">Tokens Used (K)</div>
            </div>
        </div>

        <!-- Agent Grid -->
        <div class="agents-grid" id="agents-grid">
            <div class="empty-state">
                <div class="empty-state-icon">⏳</div>
                <p>Loading agents...</p>
            </div>
        </div>
    </div>

    <script>
        // Load data from JSON file
        async function loadData() {
            try {
                const response = await fetch('dashboard-data.json?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load');
                return await response.json();
            } catch (error) {
                console.error('Error loading data:', error);
                return null;
            }
        }

        function getWorkloadClass(percentage) {
            if (percentage < 30) return 'workload-low';
            if (percentage < 70) return 'workload-medium';
            return 'workload-high';
        }

        function getStatusClass(status) {
            return `status-${status}`;
        }

        function getCardClass(agent) {
            if (agent.errors > 0) return 'error';
            if (agent.status === 'active') return 'active';
            if (agent.workload > 50) return 'warning';
            return 'idle';
        }

        function renderAgents(data) {
            const grid = document.getElementById('agents-grid');
            
            if (!data || !data.agents) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Could not load agent data.</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = data.agents.map(agent => {
                const cardClass = getCardClass(agent);
                const statusClass = getStatusClass(agent.status === 'active' ? 'active' : agent.errors > 0 ? 'error' : 'idle');
                const workloadClass = getWorkloadClass(agent.workload);
                
                return `
                    <div class="agent-card ${cardClass}">
                        <div class="agent-header">
                            <div>
                                <div class="agent-name">${agent.emoji} ${agent.name}</div>
                                <div class="agent-role">${agent.role}</div>
                            </div>
                            <span class="status-badge ${statusClass}">${agent.status}</span>
                        </div>
                        
                        <div class="agent-metrics">
                            <div class="metric">
                                <div class="metric-value">${agent.tasks}</div>
                                <div class="metric-label">Tasks</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value" style="color: ${agent.errors > 0 ? '#ef4444' : '#4ade80'}">${agent.errors}</div>
                                <div class="metric-label">Errors</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${agent.tokens.toFixed(1)}k</div>
                                <div class="metric-label">Tokens</div>
                            </div>
                        </div>
                        
                        <div class="workload-bar">
                            <div class="workload-fill ${workloadClass}" style="width: ${agent.workload}%"></div>
                        </div>
                        
                        <div class="agent-schedule">
                            <div>${agent.schedule}</div>
                            <div class="next-run">⏰ Next: ${agent.nextRun}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderActionItems(data) {
            const container = document.getElementById('action-items');
            
            if (!data || !data.actionItems) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Could not load action items.</p>
                    </div>
                `;
                return;
            }
            
            const pendingItems = data.actionItems.filter(a => !a.resolved);
            document.getElementById('action-count').textContent = pendingItems.length;
            
            if (pendingItems.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✅</div>
                        <p>No pending actions. All agents running smoothly.</p>
                    </div>
                `;
                return;
            }
            
            // Sort by priority
            const priorityOrder = { high: 0, medium: 1, low: 2 };
            pendingItems.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
            
            container.innerHTML = pendingItems.map(item => `
                <div class="action-item ${item.priority === 'high' ? 'high-priority' : ''}" onclick="handleAction(${item.id})">
                    <div class="action-text">
                        <div>
                            <span class="priority-indicator priority-${item.priority}">${item.priority}</span>
                            ${item.text}
                        </div>
                        <div class="action-agent">From: ${item.agent} • ${new Date(item.created).toLocaleTimeString()}</div>
                    </div>
                    <button class="action-btn" onclick="event.stopPropagation(); handleAction(${item.id})">
                        ${item.action}
                    </button>
                </div>
            `).join('');
        }

        function updateStats(data) {
            if (!data || !data.summary) return;
            
            document.getElementById('total-agents').textContent = data.summary.totalAgents;
            document.getElementById('tasks-today').textContent = data.summary.tasksToday;
            document.getElementById('errors-today').textContent = data.summary.errorsToday;
            document.getElementById('tokens-today').textContent = data.summary.tokensToday.toFixed(1);
        }

        function updateTimestamp(data) {
            const lastUpdate = data && data.lastUpdate ? new Date(data.lastUpdate) : new Date();
            document.getElementById('last-update').textContent = lastUpdate.toLocaleString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        async function refreshDashboard() {
            const data = await loadData();
            
            if (data) {
                renderAgents(data);
                renderActionItems(data);
                updateStats(data);
                updateTimestamp(data);
            }
        }

        function handleAction(id) {
            // In a real implementation, this would update the JSON file
            // For now, just log it
            console.log(`Action ${id} clicked`);
            alert(`Action ${id} marked for follow-up.\n\nThe main agent will see this response on next interaction.`);
        }

        function quickMessage(text) {
            const input = document.getElementById('user-message');
            input.value = text;
            input.focus();
        }

        // Handle form submission
        document.getElementById('user-message').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const message = this.value.trim();
                if (message) {
                    console.log('User message:', message);
                    alert(`Message sent to agents:\n\n"${message}"\n\nThe main agent will receive this on next interaction.`);
                    this.value = '';
                }
            }
        });

        // Initial load
        refreshDashboard();

        // Auto-refresh every 30 seconds
        setInterval(refreshDashboard, 30000);
    </script>
</body>
</html>
