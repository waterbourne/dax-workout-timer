<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAX — Workout Timer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #ff6b35; --secondary: #1a1a2e; --accent: #16213e; --text: #e8e8e8; --text-muted: #888; --success: #4ecdc4; --warning: #ffe66d; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--secondary); color: var(--text); min-height: 100vh; }
        .container { max-width: 700px; margin: 0 auto; padding: 15px; }
        header { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--accent); margin-bottom: 15px; }
        .logo { font-size: 2rem; } h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; } .subtitle { color: var(--text-muted); font-size: 0.85rem; }
        .app-mode-bar { display: flex; justify-content: center; margin-bottom: 20px; }
        .app-mode-toggle { background: var(--accent); border-radius: 25px; padding: 4px; display: flex; }
        .app-mode-btn { padding: 10px 24px; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: 20px; }
        .app-mode-btn.active { background: var(--primary); color: white; }
        .full-tabs { margin-bottom: 15px; } .tab-bar { display: flex; background: var(--accent); border-radius: 12px; padding: 4px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: white; }
        .camera-workout-section, .timer-only-section { display: none; } .camera-workout-section.active, .timer-only-section.active { display: block; }
        .workout-header { background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%); border-radius: 16px; padding: 20px; margin-bottom: 15px; text-align: center; }
        .phase-label { text-transform: uppercase; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 5px; }
        .current-exercise { font-size: 1.3rem; font-weight: 600; margin-bottom: 5px; }
        .timer-display { font-size: 3.5rem; font-weight: 200; margin: 10px 0; }
        .timer-display.running { color: var(--success); } .timer-display.rest { color: var(--warning); }
        .next-up { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin: 15px 0; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 3px; transition: width 0.3s; }
        .timer-controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn { padding: 12px 28px; border: none; border-radius: 50px; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--primary); color: white; } .btn-secondary { background: transparent; color: var(--text); border: 2px solid var(--text-muted); }
        .camera-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto 15px; background: #000; border-radius: 12px; overflow: hidden; }
        #cameraVideo, #cameraCanvas { width: 100%; height: auto; display: block; transform: scaleX(-1); }
        #cameraCanvas { position: absolute; top: 0; left: 0; }
        .ai-overlay { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; }
        .ai-stat-pill { background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; }
        .ai-stat-pill .value { font-weight: 700; color: var(--success); } .ai-stat-pill .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .camera-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .feedback { padding: 12px; background: rgba(78, 205, 196, 0.1); border-left: 4px solid var(--success); border-radius: 0 10px 10px 0; font-size: 0.9rem; margin-bottom: 15px; }
        .exercise-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .exercise-card { flex: 0 0 auto; width: 140px; background: var(--accent); border-radius: 12px; padding: 12px; border: 2px solid transparent; }
        .exercise-card.active { border-color: var(--success); background: rgba(78, 205, 196, 0.1); } .exercise-card.completed { opacity: 0.4; }
        .exercise-card .num { width: 24px; height: 24px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; margin-bottom: 8px; }
        .exercise-card.rest .num { background: var(--warning); color: var(--secondary); }
        .exercise-card .name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; } .exercise-card .duration { font-size: 0.75rem; color: var(--success); }
        .workout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .workout-card { background: var(--accent); border: 2px solid transparent; border-radius: 12px; padding: 14px; cursor: pointer; }
        .workout-card:hover { border-color: var(--primary); } .workout-card.active { border-color: var(--success); background: rgba(78, 205, 196, 0.1); }
        .workout-card .badge { float: right; background: var(--success); color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 8px; }
        .workout-card .date { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
        .workout-card .title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; } .workout-card .meta { font-size: 0.75rem; color: var(--text-muted); }
        .exercise-list-full { background: var(--accent); border-radius: 16px; padding: 15px; } .exercise-item { display: flex; align-items: center; padding: 10px; margin-bottom: 6px; background: rgba(255,255,255,0.05); border-radius: 8px; border-left: 3px solid transparent; }
        .exercise-item.active { border-left-color: var(--success); background: rgba(78, 205, 196, 0.1); } .exercise-item.completed { opacity: 0.4; }
        .exercise-item.rest .num { background: var(--warning); color: var(--secondary); }
        .num { width: 24px; height: 24px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.7rem; margin-right: 10px; }
        .empty { text-align: center; padding: 30px; color: var(--text-muted); }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .loading-overlay.show { display: flex; } .spinner { width: 50px; height: 50px; border: 4px solid var(--text-muted); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 600px) { .timer-display { font-size: 2.5rem; } .app-mode-btn { padding: 10px 16px; font-size: 0.85rem; } .exercise-card { width: 120px; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p style="margin-top:20px;color:var(--text-muted)">Loading AI...</p></div>
    <div class="container">
        <header><div class="logo">💪</div><h1>DAX</h1><div class="subtitle" id="appSubtitle">Workout Timer</div></header>
        <div class="app-mode-bar"><div class="app-mode-toggle"><button class="app-mode-btn active" onclick="setAppMode('simple')" id="simpleBtn">⚡ Simple</button><button class="app-mode-btn" onclick="setAppMode('full')" id="fullBtn">🤖 AI + Camera</button></div></div>
        <div id="fullTabs" class="full-tabs" style="display:none;"><div class="tab-bar"><button class="tab-btn active" onclick="setTab('timer')" id="timerTab">⏱️ Timer Only</button><button class="tab-btn" onclick="setTab('camera')" id="cameraTab">📷 AI + Timer</button></div></div>
        
        <!-- Camera + Workout Combined -->
        <div class="camera-workout-section" id="cameraWorkoutSection">
            <div class="workout-header">
                <div class="phase-label" id="camPhase">SELECT A WORKOUT</div>
                <div class="current-exercise" id="camCurrentEx">Choose workout below</div>
                <div class="timer-display" id="camTimerDisplay">00:00</div>
                <div class="next-up" id="camNextUp"></div>
                <div class="progress-bar"><div class="progress-fill" id="camProgress" style="width:0%"></div></div>
                <div class="timer-controls"><button class="btn btn-primary" id="camTimerBtn" onclick="toggleTimer()">START</button><button class="btn btn-secondary" onclick="resetTimer()">RESET</button></div>
            </div>
            <div class="camera-container">
                <video id="cameraVideo" autoplay playsinline></video><canvas id="cameraCanvas"></canvas>
                <div class="ai-overlay"><div class="ai-stat-pill"><div class="value" id="repCount">0</div><div class="label">Reps</div></div><div class="ai-stat-pill"><div class="value" id="confScore">--</div><div class="label">AI</div></div></div>
            </div>
            <div class="camera-controls"><button class="btn btn-primary" id="camBtn" onclick="toggleCamera()">Start Camera</button><button class="btn btn-secondary" onclick="resetReps()">Reset Reps</button></div>
            <div class="feedback" id="feedback">Start camera for AI form tracking</div>
            <div class="exercise-scroll" id="camExerciseScroll"><div class="empty">Select a workout</div></div>
        </div>
        
        <!-- Simple Timer Mode -->
        <div class="timer-only-section active" id="timerOnlySection">
            <div class="workout-grid" id="workoutGrid"><div class="empty" style="grid-column:1/-1">Loading...</div></div>
            <div class="workout-header">
                <div class="phase-label" id="phase">SELECT A WORKOUT</div>
                <div class="current-exercise" id="currentEx">Choose a workout below</div>
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
                <div class="timer-controls"><button class="btn btn-primary" id="timerBtn" onclick="toggleTimer()">START</button><button class="btn btn-secondary" onclick="resetTimer()">RESET</button></div>
            </div>
            <div class="exercise-list-full"><h3 style="margin-bottom:12px;font-size:0.95rem">📋 Exercises</h3><div id="exList"><div class="empty">Select a workout</div></div></div>
        </div>
    </div>

<script>
let detector=null,cameraActive=false,video,canvas,ctx,repCount=0,repState='up',animationId=null;
async function initAI(){if(detector)return;document.getElementById('loadingOverlay').classList.add('show');try{const a=document.createElement('script');a.src='https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js';document.head.appendChild(a);await new Promise(r=>a.onload=r);const b=document.createElement('script');b.src='https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js';document.head.appendChild(b);await new Promise(r=>b.onload=r);await tf.setBackend('webgl');detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING})}catch(e){}document.getElementById('loadingOverlay').classList.remove('show')}
async function toggleCamera(){if(!detector)await initAI();if(cameraActive){stopCamera();return}video=document.getElementById('cameraVideo');canvas=document.getElementById('cameraCanvas');ctx=canvas.getContext('2d');try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});video.srcObject=s;await new Promise(r=>video.onloadedmetadata=r);canvas.width=video.videoWidth;canvas.height=video.videoHeight;cameraActive=true;document.getElementById('camBtn').textContent='Stop Camera';detectPose()}catch(e){alert('Camera error: '+e.message)}}
function stopCamera(){cameraActive=false;if(animationId)cancelAnimationFrame(animationId);if(video?.srcObject)video.srcObject.getTracks().forEach(t=>t.stop());document.getElementById('camBtn').textContent='Start Camera';ctx?.clearRect(0,0,canvas.width,canvas.height)}
async function detectPose(){if(!cameraActive)return;try{const p=await detector.estimatePoses(video);ctx.clearRect(0,0,canvas.width,canvas.height);if(p.length){drawPose(p[0]);analyzePose(p[0])}else document.getElementById('confScore').textContent='--'}catch(e){}animationId=requestAnimationFrame(detectPose)}
function drawPose(p){const k=p.keypoints,c=[['left_shoulder','right_shoulder'],['left_shoulder','left_elbow'],['left_elbow','left_wrist'],['right_shoulder','right_elbow'],['right_elbow','right_wrist'],['left_shoulder','left_hip'],['right_shoulder','right_hip'],['left_hip','right_hip'],['left_hip','left_knee'],['left_knee','left_ankle'],['right_hip','right_knee'],['right_knee','right_ankle']];ctx.strokeStyle='#4ecdc4';ctx.lineWidth=3;c.forEach(([a,b])=>{const p1=k.find(x=>x.name===a),p2=k.find(x=>x.name===b);if(p1?.score>0.3&&p2?.score>0.3){ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke()}});k.forEach(p=>{if(p.score>0.3){ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill()}})}
function analyzePose(p){const k=n=>p.keypoints.find(x=>x.name===n),sc=p.keypoints.reduce((s,x)=>s+x.score,0)/p.keypoints.length;document.getElementById('confScore').textContent=Math.round(sc*100)+'%';const cur=exercises[currentIdx];if(!cur||cur.type==='rest')return;const hip=k('left_hip')||k('right_hip'),knee=k('left_knee')||k('right_knee'),ankle=k('left_ankle')||k('right_ankle');if(hip&&knee&&ankle){const d=(ankle.y-hip.y)/(ankle.y-knee.y);if(d<0.8&&repState==='up'){repState='down';document.getElementById('feedback').textContent='🔻 Good depth!'}else if(d>1.1&&repState==='down'){repCount++;repState='up';document.getElementById('repCount').textContent=repCount;document.getElementById('feedback').textContent='✅ Rep '+repCount;navigator.vibrate?.(100)}}if(repState==='up'&&!document.getElementById('feedback').textContent.includes('Rep'))document.getElementById('feedback').textContent='Lower to count reps'}
function resetReps(){repCount=0;repState='up';document.getElementById('repCount').textContent='0'}

let appMode='simple',currentTab='timer',workouts=[],selectedWorkout=null,exercises=[],currentIdx=0,timerRunning=false,timerInterval=null,timeRemaining=0;
function setAppMode(m){appMode=m;document.getElementById('simpleBtn').classList.toggle('active',m==='simple');document.getElementById('fullBtn').classList.toggle('active',m==='full');document.getElementById('appSubtitle').textContent=m==='simple'?'Workout Timer':'Workout Timer + AI Form';document.getElementById('fullTabs').style.display=m==='full'?'block':'none';if(m==='simple'){stopCamera();setTab('timer')}else{setTab('camera')}}
function setTab(t){currentTab=t;document.getElementById('timerTab').classList.toggle('active',t==='timer');document.getElementById('cameraTab').classList.toggle('active',t==='camera');document.getElementById('cameraWorkoutSection').classList.toggle('active',t==='camera');document.getElementById('timerOnlySection').classList.toggle('active',t==='timer');if(t==='camera'&&!detector)initAI()}
async function loadWorkouts(){try{const r=await fetch('dax-workouts.json?t='+Date.now()),d=await r.json();workouts=d.workouts||[];renderWorkoutGrid();if(workouts.length)selectWorkout(workouts[0].id)}catch(e){document.getElementById('workoutGrid').innerHTML='<div class="empty" style="grid-column:1/-1">Error loading workouts</div>'}}
function renderWorkoutGrid(){const g=document.getElementById('workoutGrid');if(!workouts.length){g.innerHTML='<div class="empty" style="grid-column:1/-1">No workouts</div>';return}g.innerHTML=workouts.map((w,i)=>`<div class="workout-card ${w.id===selectedWorkout?'active':''}" onclick="selectWorkout('${w.id}')">${i===0?'<span class="badge">NEW</span>':''}<div class="date">${w.date}</div><div class="title">${w.title}</div><div class="meta">${w.focus} • ${w.exercises.length} exercises</div></div>`).join('')}
function selectWorkout(id){selectedWorkout=id;renderWorkoutGrid();const w=workouts.find(x=>x.id===id);if(!w)return;resetTimer();exercises=[];let n=0;w.exercises.forEach(e=>{n++;exercises.push({...e,idx:n});if(e.type==='main')exercises.push({name:'REST',duration:15,type:'rest',phase:'REST',idx:null})});renderExerciseList();renderCameraExercises();updateDisplay()}
function renderExerciseList(){document.getElementById('exList').innerHTML=exercises.map((e,i)=>`<div class="exercise-item ${e.type==='rest'?'rest':''} ${i===0?'active':''}" id="ex-${i}"><div class="num">${e.idx||'⏸️'}</div><div style="flex:1"><div style="font-weight:600;font-size:0.9rem">${e.name}</div><div style="font-size:0.75rem;color:var(--text-muted)">${e.detail||e.phase}</div></div><div style="color:var(--success);font-weight:600">${e.duration}s</div></div>`).join('')}
function renderCameraExercises(){document.getElementById('camExerciseScroll').innerHTML=exercises.map((e,i)=>`<div class="exercise-card ${e.type==='rest'?'rest':''} ${i===0?'active':''}" id="cam-ex-${i}"><div class="num">${e.idx||'⏸️'}</div><div class="name">${e.name}</div><div class="duration">${e.duration}s</div></div>`).join('')}
function formatTime(s){const m=Math.floor(s/60),sec=s%60;return`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}
function updateDisplay(){const cur=exercises[currentIdx],next=exercises[currentIdx+1];document.getElementById('timerDisplay').textContent=formatTime(timeRemaining);document.getElementById('camTimerDisplay').textContent=formatTime(timeRemaining);if(cur){document.getElementById('phase').textContent=cur.phase;document.getElementById('currentEx').textContent=cur.name;document.getElementById('camPhase').textContent=cur.phase;document.getElementById('camCurrentEx').textContent=cur.name;document.getElementById('camNextUp').textContent=next?'Next: '+next.name:'Last exercise!';const tc='timer-display '+(cur.type==='main'?'running':cur.type==='rest'?'rest':'');document.getElementById('timerDisplay').className=tc;document.getElementById('camTimerDisplay').className=tc;const pr=(currentIdx/exercises.length*100)+'%';document.getElementById('progress').style.width=pr;document.getElementById('camProgress').style.width=pr;exercises.forEach((_,i)=>{const el=document.getElementById(`ex-${i}`),cam=document.getElementById(`cam-ex-${i}`);if(el){el.classList.remove('active','completed');if(i===currentIdx)el.classList.add('active');else if(i<currentIdx)el.classList.add('completed')}if(cam){cam.classList.remove('active','completed');if(i===currentIdx)cam.classList.add('active');else if(i<currentIdx)cam.classList.add('completed')}});const ace=document.getElementById(`cam-ex-${currentIdx}`);if(ace)ace.scrollIntoView({behavior:'smooth',inline:'center'})}else{document.getElementById('phase').textContent='COMPLETE!';document.getElementById('currentEx').textContent='Great job!';document.getElementById('camPhase').textContent='COMPLETE!';document.getElementById('camCurrentEx').textContent='Great job!';document.getElementById('camNextUp').textContent='';document.getElementById('progress').style.width='100%';document.getElementById('camProgress').style.width='100%'}}
function tick(){timeRemaining--;if(timeRemaining<=0){currentIdx++;if(currentIdx>=exercises.length){finishWorkout();return}timeRemaining=exercises[currentIdx].duration;if(exercises[currentIdx].type==='rest'){navigator.vibrate?.([100,50,100]);document.getElementById('feedback').textContent='⏸️ REST'}else{navigator.vibrate?.(200);document.getElementById('feedback').textContent='💪 GO!';repCount=0;repState='up';document.getElementById('repCount').textContent='0'}}updateDisplay()}
function finishWorkout(){timerRunning=false;clearInterval(timerInterval);document.getElementById('timerBtn').textContent='START';document.getElementById('camTimerBtn').textContent='START';document.getElementById('timerDisplay').textContent='DONE!';document.getElementById('camTimerDisplay').textContent='DONE!';navigator.vibrate?.([200,100,200,100,400]);document.getElementById('feedback').textContent='🎉 Complete!'}
function toggleTimer(){if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerBtn').textContent='RESUME';document.getElementById('camTimerBtn').textContent='RESUME'}else{if(currentIdx>=exercises.length){currentIdx=0;timeRemaining=0}if(!exercises.length)return;if(timeRemaining===0)timeRemaining=exercises[currentIdx].duration;timerRunning=true;timerInterval=setInterval(tick,1000);document.getElementById('timerBtn').textContent='PAUSE';document.getElementById('camTimerBtn').textContent='PAUSE';navigator.vibrate?.(100)}}
function resetTimer(){timerRunning=false;clearInterval(timerInterval);currentIdx=0;timeRemaining=0;repCount=0;repState='up';document.getElementById('timerBtn').textContent='START';document.getElementById('camTimerBtn').textContent='START';document.getElementById('repCount').textContent='0';updateDisplay()}
loadWorkouts();
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();toggleTimer()}else if(e.code==='Escape')resetTimer()});
</script>
</body>
</html>
