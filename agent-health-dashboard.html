<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Agent Health Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #c9d1d9; --text-muted: #8b949e;
            --success: #238636; --warning: #f0883e; --danger: #da3633;
            --info: #58a6ff; --primary: #8957e5;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: var(--text-muted); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 12px; padding: 20px;
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        
        /* Status Cards */
        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .status-item { text-align: center; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 8px; }
        .status-item .value { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .status-item .label { font-size: 0.8rem; color: var(--text-muted); }
        .status-item.success .value { color: var(--success); }
        .status-item.warning .value { color: var(--warning); }
        .status-item.danger .value { color: var(--danger); }
        
        /* Agent List */
        .agent-list { display: flex; flex-direction: column; gap: 10px; }
        .agent-row { 
            display: flex; align-items: center; padding: 12px 15px;
            background: rgba(255,255,255,0.03); border-radius: 8px;
            border-left: 4px solid var(--border);
        }
        .agent-row.ok { border-left-color: var(--success); }
        .agent-row.warning { border-left-color: var(--warning); }
        .agent-row.error { border-left-color: var(--danger); }
        .agent-name { flex: 1; font-weight: 600; }
        .agent-time { color: var(--text-muted); font-size: 0.85rem; margin-right: 15px; }
        .agent-model { 
            background: var(--primary); color: white; font-size: 0.7rem;
            padding: 3px 10px; border-radius: 12px; margin-right: 10px;
        }
        .agent-status { 
            width: 10px; height: 10px; border-radius: 50%; 
            background: var(--text-muted);
        }
        .agent-row.ok .agent-status { background: var(--success); }
        .agent-row.warning .agent-status { background: var(--warning); }
        .agent-row.error .agent-status { background: var(--danger); animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* Latency Chart */
        .latency-bar { display: flex; align-items: center; margin-bottom: 10px; }
        .latency-bar .label { width: 80px; font-size: 0.85rem; }
        .latency-bar .bar-container { flex: 1; height: 20px; background: var(--border); border-radius: 10px; overflow: hidden; }
        .latency-bar .bar { height: 100%; border-radius: 10px; transition: width 0.3s; }
        .latency-bar .bar.fast { background: var(--success); }
        .latency-bar .bar.medium { background: var(--warning); }
        .latency-bar .bar.slow { background: var(--danger); }
        .latency-bar .value { width: 60px; text-align: right; font-size: 0.85rem; color: var(--text-muted); }
        
        /* Refresh button */
        .refresh-bar { 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px 20px; margin-bottom: 20px;
        }
        .refresh-btn { 
            background: var(--primary); color: white; border: none;
            padding: 10px 24px; border-radius: 8px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .refresh-btn:hover { opacity: 0.9; }
        .last-updated { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Error patterns */
        .error-item { 
            padding: 12px; background: rgba(218, 54, 51, 0.1); 
            border-left: 4px solid var(--danger); border-radius: 0 8px 8px 0;
            margin-bottom: 10px;
        }
        .error-item .agent { font-weight: 600; color: var(--danger); }
        .error-item .count { float: right; background: var(--danger); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }
        .error-item .detail { color: var(--text-muted); font-size: 0.85rem; margin-top: 5px; }
        
        /* Responsive */
        @media (max-width: 600px) {
            .status-grid { grid-template-columns: 1fr; }
            .agent-row { flex-wrap: wrap; }
            .agent-time { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 OpenClaw Agent Health</h1>
            <div class="subtitle">Real-time monitoring of your AI agent fleet</div>
        </header>
        
        <div class="refresh-bar">
            <div class="last-updated" id="lastUpdated">Last updated: Never</div>
            <button class="refresh-btn" onclick="refreshData()">
                <span>🔄</span> Refresh
            </button>
        </div>
        
        <div class="grid">
            <!-- Status Overview -->
            <div class="card">
                <h2>System Status</h2>
                <div class="status-grid">
                    <div class="status-item success" id="healthyAgents">
                        <div class="value">--</div>
                        <div class="label">Healthy</div>
                    </div>
                    <div class="status-item warning" id="warningAgents">
                        <div class="value">--</div>
                        <div class="label">Warnings</div>
                    </div>
                    <div class="status-item danger" id="errorAgents">
                        <div class="value">--</div>
                        <div class="label">Errors</div>
                    </div>
                </div>
            </div>
            
            <!-- Model Latency -->
            <div class="card">
                <h2>Avg Response Time</h2>
                <div id="latencyChart">
                    <div class="latency-bar">
                        <div class="label">Llama</div>
                        <div class="bar-container"><div class="bar fast" style="width: 30%"></div></div>
                        <div class="value">--</div>
                    </div>
                    <div class="latency-bar">
                        <div class="label">Phi4</div>
                        <div class="bar-container"><div class="bar medium" style="width: 50%"></div></div>
                        <div class="value">--</div>
                    </div>
                    <div class="latency-bar">
                        <div class="label">Kimi</div>
                        <div class="bar-container"><div class="bar" style="width: 70%"></div></div>
                        <div class="value">--</div>
                    </div>
                </div>
            </div>
            
            <!-- Delivery Success -->
            <div class="card">
                <h2>Delivery Success Rate</h2>
                <div class="status-grid">
                    <div class="status-item success">
                        <div class="value" id="successRate">--%</div>
                        <div class="label">Last 24h</div>
                    </div>
                    <div class="status-item">
                        <div class="value" id="totalDeliveries">--</div>
                        <div class="label">Deliveries</div>
                    </div>
                    <div class="status-item">
                        <div class="value" id="failedDeliveries">--</div>
                        <div class="label">Failed</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Agent Status List -->
        <div class="card">
            <h2>Agent Fleet</h2>
            <div class="agent-list" id="agentList">
                <div class="empty" style="text-align:center;padding:40px;color:var(--text-muted)">Loading...</div>
            </div>
        </div>
        
        <!-- Error Patterns -->
        <div class="card" id="errorCard" style="display:none;">
            <h2>⚠️ Recurring Issues</h2>
            <div id="errorPatterns"></div>
        </div>
    </div>

<script>
// Mock data structure - replace with actual OpenClaw API calls
const agentData = {
    agents: [
        { name: 'Dax', schedule: '4:30 AM', model: 'Llama', status: 'ok', lastRun: '12h ago', errors: 0 },
        { name: 'Guru', schedule: '5:15 AM', model: 'Llama', status: 'ok', lastRun: '12h ago', errors: 0 },
        { name: 'Morning Briefing', schedule: '5:00 AM', model: 'Llama', status: 'ok', lastRun: '12h ago', errors: 0 },
        { name: 'Sol', schedule: '7:00 AM', model: 'Phi4', status: 'warning', lastRun: '11h ago', errors: 1, lastError: 'Timeout' },
        { name: 'Balthazar', schedule: '1:00 PM', model: 'Llama', status: 'ok', lastRun: '5h ago', errors: 0 },
        { name: 'Atlas', schedule: '5:15 PM', model: 'Phi4', status: 'error', lastRun: '1h ago', errors: 3, lastError: 'Delivery failed' },
        { name: 'Raju', schedule: '7:00 PM', model: 'Llama', status: 'ok', lastRun: '23h ago', errors: 0 },
        { name: 'Calendar Monitor', schedule: 'Every 15m', model: 'Llama', status: 'ok', lastRun: '5m ago', errors: 0 },
        { name: 'Error Review', schedule: '10:30 PM', model: 'Phi4', status: 'error', lastRun: '22h ago', errors: 4, lastError: 'Delivery failed' }
    ],
    latency: { llama: '2.3s', phi4: '4.1s', kimi: '3.8s' },
    deliveryRate: 94,
    totalRuns: 16,
    failedRuns: 1
};

function renderDashboard() {
    // Count statuses
    const healthy = agentData.agents.filter(a => a.status === 'ok').length;
    const warning = agentData.agents.filter(a => a.status === 'warning').length;
    const error = agentData.agents.filter(a => a.status === 'error').length;
    
    document.getElementById('healthyAgents').querySelector('.value').textContent = healthy;
    document.getElementById('warningAgents').querySelector('.value').textContent = warning;
    document.getElementById('errorAgents').querySelector('.value').textContent = error;
    
    // Latency
    const bars = document.querySelectorAll('.latency-bar');
    bars[0].querySelector('.value').textContent = agentData.latency.llama;
    bars[1].querySelector('.value').textContent = agentData.latency.phi4;
    bars[2].querySelector('.value').textContent = agentData.latency.kimi;
    
    // Delivery stats
    document.getElementById('successRate').textContent = agentData.deliveryRate + '%';
    document.getElementById('totalDeliveries').textContent = agentData.totalRuns;
    document.getElementById('failedDeliveries').textContent = agentData.failedRuns;
    
    // Agent list
    const list = document.getElementById('agentList');
    list.innerHTML = agentData.agents.map(a => `
        <div class="agent-row ${a.status}">
            <div class="agent-name">${a.name}</div>
            <div class="agent-time">${a.schedule} • ${a.lastRun}</div>
            <div class="agent-model">${a.model}</div>
            <div class="agent-status"></div>
        </div>
    `).join('');
    
    // Error patterns
    const errorAgents = agentData.agents.filter(a => a.errors > 0);
    if (errorAgents.length > 0) {
        document.getElementById('errorCard').style.display = 'block';
        document.getElementById('errorPatterns').innerHTML = errorAgents.map(a => `
            <div class="error-item">
                <span class="agent">${a.name}</span>
                <span class="count">${a.errors} errors</span>
                <div class="detail">Last: ${a.lastError}</div>
            </div>
        `).join('');
    }
    
    // Timestamp
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

function refreshData() {
    // TODO: Fetch from actual OpenClaw API
    // For now, just re-render with animation
    document.querySelector('.refresh-btn').style.opacity = '0.5';
    setTimeout(() => {
        renderDashboard();
        document.querySelector('.refresh-btn').style.opacity = '1';
    }, 500);
}

// Auto-refresh every 30 seconds
setInterval(refreshData, 30000);

// Initial render
renderDashboard();
</script>
</body>
</html>
